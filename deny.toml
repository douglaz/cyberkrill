# cargo-deny configuration for cyberkrill
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-unknown-linux-musl" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
]

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Rationale for each ignore lives in .cargo/audit.toml so cargo-audit and
# cargo-deny stay in sync — keep both files updated together.
ignore = [
    # serde_cbor - unmaintained but required by dependencies
    "RUSTSEC-2021-0127",
    # rustls-webpki 0.101.7 via minreq -> esplora-client -> bdk_esplora.
    # Blocked on upstream esplora-client dropping minreq.
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
    "RUSTSEC-2026-0104",
    # core2 0.4.0 unmaintained/yanked via libflate -> libsodium-sys-stable.
    "RUSTSEC-2026-0105",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CC0-1.0",
    "MPL-2.0",
    "Unlicense",
    "Zlib",
    "OpenSSL",
    "MITNFA",
    "GPL-3.0-or-later",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8
private = { ignore = true }

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[[licenses.clarify]]
name = "unescaper"
expression = "GPL-3.0-or-later OR MIT"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
deny = [
    { name = "openssl" },
]

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    "https://github.com/rust-bitcoin/rust-bip39",
    "https://github.com/douglaz/cktap-direct",
    "https://github.com/douglaz/rust-coldcard",
    "https://github.com/planktonlabs/frozenkrill",
    "https://github.com/douglaz/hidraw-rs",
    "https://github.com/trezor/trezor-firmware",
]